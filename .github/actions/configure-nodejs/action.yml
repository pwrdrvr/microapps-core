name: "Configure Node.js"
description: "Install Node.js and install Node.js modules or restore cache"

inputs:
  node-version:
    description: "NodeJS Version"
    default: "22.x"
  package-manager:
    description: "Explicit package manager override (npm, yarn, pnpm)"
    default: ""
  lookup-only:
    description: "If true, only checks if cache entry exists and skips download. Does not change save cache behavior"
    default: "false"

runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
        package-manager-cache: false

    - name: Resolve package manager
      id: resolve-package-manager
      shell: bash
      run: |
        node "$GITHUB_ACTION_PATH/../../../scripts/package-manager/resolve-manager.mjs" \
          --cwd "$GITHUB_WORKSPACE" \
          --package-manager "${{ inputs.package-manager }}" \
          --github-output "$GITHUB_OUTPUT"

    - name: Enable Corepack
      if: steps.resolve-package-manager.outputs.needsCorepack == 'true'
      shell: bash
      run: corepack enable

    - name: Restore Node Modules from Cache
      id: cache-node-modules
      uses: actions/cache@v5
      with:
        path: |
          node_modules
          packages/**/node_modules
          !node_modules/.cache
        key: node-modules-${{ inputs.node-version }}-${{ runner.os }}-${{ runner.arch }}-${{ steps.resolve-package-manager.outputs.managerCacheKey }}-${{ steps.resolve-package-manager.outputs.lockfileSha }}
        lookup-only: ${{ inputs.lookup-only }}

    - name: Install dependencies
      if: steps.cache-node-modules.outputs.cache-hit != 'true'
      shell: bash
      run: ${{ steps.resolve-package-manager.outputs.installCommand }}
