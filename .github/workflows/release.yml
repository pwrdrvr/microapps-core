# Based on projen template from packages/microapps-cdk/.github/workflows/release.yml
name: Release Packages
on:
  # Can enable this when the push builds skip deploy
  # push:
  #   branches:
  #     - 'main'
  release:
    types: [published]
  pull_request:
    types: [labeled, opened, synchronize]
jobs:
  install-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/configure-nodejs
        with:
          lookup-only: "true" # We only want to lookup from the cache - if a hit, this job does nothing

  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      is_prerelease: ${{ steps.get_version.outputs.is_prerelease }}
      npm_dist_tag: ${{ steps.get_version.outputs.npm_dist_tag }}
    if: github.event_name == 'release' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'TEST-RELEASE'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - uses: ./.github/actions/configure-nodejs

      - name: Get version from release tag or package.json
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            node scripts/release-metadata.mjs "${{ github.event.release.tag_name }}"
          else
            # For PR testing, use a test version based on package.json
            VERSION=$(node -p "require('./package.json').version")
            echo "version=${VERSION}-test-pr${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "npm_dist_tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Validate GitHub prerelease flag
        if: github.event_name == 'release'
        env:
          EXPECTED_PRERELEASE: ${{ steps.get_version.outputs.is_prerelease }}
          ACTUAL_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [ "$EXPECTED_PRERELEASE" != "$ACTUAL_PRERELEASE" ]; then
            echo "Release tag prerelease state ($EXPECTED_PRERELEASE) does not match GitHub release.prerelease ($ACTUAL_PRERELEASE)." >&2
            exit 1
          fi

      - name: Output version
        run: |
          echo "The version is ${{ steps.get_version.outputs.version }}"
          echo "npm dist-tag is ${{ steps.get_version.outputs.npm_dist_tag }}"

  #
  # CDK Construct
  #
  release:
    name: Build CDK Construct
    needs: [install-deps, version]
    if: github.event_name == 'release' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'TEST-RELEASE'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      latest_commit: ${{ steps.git_remote.outputs.latest_commit }}
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set git identity
        run: |-
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
      - uses: ./.github/actions/configure-nodejs
      - name: Build All TypeScript
        run: pnpm build
      - name: Run Lint
        run: pnpm lint
      - name: Run Node Tests
        env:
          NODE_ENV: test
        run: pnpm test
      - name: Install CDK Construct Deps
        working-directory: packages/microapps-cdk/
        run: pnpm install --frozen-lockfile --ignore-workspace
      - name: Prepare the Release
        working-directory: packages/microapps-cdk/
        run: npx projen release
      - name: Apply Version to Everything (Deployer / Datalib)
        run: |
          echo "Version is ${{needs.version.outputs.version }}"
          node scripts/version.js ${{needs.version.outputs.version }}
      - name: Check for new commits
        id: git_remote
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            echo latest_commit="$(git ls-remote origin -h ${{ github.ref }} | cut -f1)" >> $GITHUB_OUTPUT
          else
            # For PR testing, use the PR head SHA
            echo latest_commit="${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          fi
      - name: Upload CDK Construct Artifact
        if: ${{ steps.git_remote.outputs.latest_commit == github.sha || github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v6
        with:
          name: build-artifact
          path: packages/microapps-cdk/dist
  #
  # Publish Tool
  #
  release-publish-tool:
    needs: [release, version]
    if: github.event_name == 'release' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'TEST-RELEASE'))
    name: Build Publish Tool
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - uses: ./.github/actions/configure-nodejs
      - name: Check for new commits
        id: git_remote
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            echo latest_commit="$(git ls-remote origin -h ${{ github.ref }} | cut -f1)" >> $GITHUB_OUTPUT
          else
            echo latest_commit="${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          fi
      - name: Apply Version to Everything (Deployer / Datalib)
        run: |
          echo "Version is ${{needs.version.outputs.version }}"
          node scripts/version.js ${{needs.version.outputs.version }}
      - name: Build Publish TypeScript
        run: pnpm build:publish
      - name: Upload Publish Tool artifact
        uses: actions/upload-artifact@v6
        with:
          name: publish-tool-dist
          path: |
            packages/pwrdrvr/
            !packages/pwrdrvr/node_modules/
      - name: Upload Publish Tool - Convenience artifact
        uses: actions/upload-artifact@v6
        with:
          name: publish-tool-dist-convenience
          path: |
            packages/microapps-publish/
            !packages/microapps-publish/node_modules/
      - name: Upload Datalib artifact
        uses: actions/upload-artifact@v6
        with:
          name: datalib-dist
          path: |
            packages/microapps-datalib/
            !packages/microapps-datalib/node_modules/
      - name: Upload Router Lib artifact
        uses: actions/upload-artifact@v6
        with:
          name: router-lib-dist
          path: |
            packages/microapps-router-lib/
            !packages/microapps-router-lib/node_modules/
  release_npm:
    name: Publish to npm
    needs: [release, version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publish
    if: |
      (github.event_name == 'release' && needs.release.outputs.latest_commit == github.sha) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'TEST-RELEASE'))
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - uses: ./.github/actions/configure-nodejs
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: build-artifact
          path: dist
      - name: Extract build artifact
        run: tar --strip-components=1 -xzvf dist/js/*.tgz -C packages/microapps-cdk
      - name: Move build artifact out of the way
        run: mv dist dist.old
      - name: Create js artifact
        working-directory: packages/microapps-cdk
        run: npx projen package:js
      - name: Validate js artifact was created
        working-directory: packages/microapps-cdk
        run: |
          if [ ! -d "dist" ]; then
            echo "ERROR: dist directory was not created"
            exit 1
          fi
          if [ ! -d "dist/js" ]; then
            echo "ERROR: dist/js directory was not created"
            exit 1
          fi
          if [ -z "$(ls -A dist/js/*.tgz 2>/dev/null)" ]; then
            echo "ERROR: No .tgz files found in dist/js"
            exit 1
          fi
          echo "✓ JS artifact validated successfully"
          ls -lh dist/js/
      - name: Collect js Artifact
        run: mv packages/microapps-cdk/dist dist
      - name: Release
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "PR test mode: Running npm publish --dry-run instead of actual publish"
            # npm publish can accept a tarball file directly
            TARBALL=$(ls dist/js/*.tgz | head -1)
            if [ -z "$TARBALL" ]; then
              echo "ERROR: No tarball found in dist/js/"
              exit 1
            fi
            npx --yes -p npm@11.5.1 npm publish --dry-run "$TARBALL" || true
          else
            npx --yes -p npm@11.5.1 -p publib@latest publib-npm
          fi
        env:
          NPM_DIST_TAG: ${{ needs.version.outputs.npm_dist_tag }}
          NPM_REGISTRY: registry.npmjs.org
          NPM_TRUSTED_PUBLISHER: "true"
  release_npm_publish_tool:
    name: Publish to npm - Publish Tool
    needs: [release, version, release_npm, release-publish-tool]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publish
    if: |
      (github.event_name == 'release' && needs.release.outputs.latest_commit == github.sha) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'TEST-RELEASE'))
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - uses: ./.github/actions/configure-nodejs
      - name: Download Publish Tool build artifacts
        uses: actions/download-artifact@v5
        with:
          name: publish-tool-dist
          path: packages/pwrdrvr
      - name: Download Publish Tool - Convenience build artifacts
        uses: actions/download-artifact@v5
        with:
          name: publish-tool-dist-convenience
          path: packages/microapps-publish
      - name: Download Datalib build artifacts
        uses: actions/download-artifact@v5
        with:
          name: datalib-dist
          path: packages/microapps-datalib
      - name: Download Router Lib build artifacts
        uses: actions/download-artifact@v5
        with:
          name: router-lib-dist
          path: packages/microapps-router-lib
      #
      # Publish other non-JSII Artifacts to NPM
      #
      - name: Release Publish Tool - NPM
        working-directory: packages/pwrdrvr/
        env:
          NPM_DIST_TAG: ${{ needs.version.outputs.npm_dist_tag }}
          NPM_TRUSTED_PUBLISHER: "true"
        run: |
          PACK_DIR=../../dist/npm-packages/pwrdrvr
          rm -rf "$PACK_DIR"
          mkdir -p "$PACK_DIR"
          pnpm pack --pack-destination "$PACK_DIR" > /dev/null
          TARBALL=$(echo "$PACK_DIR"/*.tgz)
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            npx --yes -p npm@11.5.1 npm publish --dry-run --tag pr "$TARBALL"
          else
            npx --yes -p npm@11.5.1 npm publish --tag "$NPM_DIST_TAG" "$TARBALL"
          fi
      - name: Release Publish Tool - Convenience - NPM
        working-directory: packages/microapps-publish/
        env:
          NPM_DIST_TAG: ${{ needs.version.outputs.npm_dist_tag }}
          NPM_TRUSTED_PUBLISHER: "true"
        run: |
          PACK_DIR=../../dist/npm-packages/microapps-publish
          rm -rf "$PACK_DIR"
          mkdir -p "$PACK_DIR"
          pnpm pack --pack-destination "$PACK_DIR" > /dev/null
          TARBALL=$(echo "$PACK_DIR"/*.tgz)
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            npx --yes -p npm@11.5.1 npm publish --dry-run --tag pr "$TARBALL"
          else
            npx --yes -p npm@11.5.1 npm publish --tag "$NPM_DIST_TAG" "$TARBALL"
          fi
      - name: Release DataLib - NPM
        working-directory: packages/microapps-datalib/
        env:
          NPM_DIST_TAG: ${{ needs.version.outputs.npm_dist_tag }}
          NPM_TRUSTED_PUBLISHER: "true"
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            npx --yes -p npm@11.5.1 npm publish --dry-run
          else
            npx --yes -p npm@11.5.1 npm publish --tag "$NPM_DIST_TAG"
          fi
      - name: Release Router Lib - NPM
        working-directory: packages/microapps-router-lib/
        env:
          NPM_DIST_TAG: ${{ needs.version.outputs.npm_dist_tag }}
          NPM_TRUSTED_PUBLISHER: "true"
        run: |
          PACK_DIR=../../dist/npm-packages/microapps-router-lib
          rm -rf "$PACK_DIR"
          mkdir -p "$PACK_DIR"
          pnpm pack --pack-destination "$PACK_DIR" > /dev/null
          TARBALL=$(echo "$PACK_DIR"/*.tgz)
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            npx --yes -p npm@11.5.1 npm publish --dry-run --tag pr --access public "$TARBALL"
          else
            npx --yes -p npm@11.5.1 npm publish --access public --tag "$NPM_DIST_TAG" "$TARBALL"
          fi
